<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Codex UI Demo</title><style>
body{margin:0;background:#0b0f19;color:#eee;font-family:Arial}header{padding:16px;background:#111827}aside{width:220px;background:#161b22;padding:16px}main{flex:1;padding:16px}.wrap{display:flex}.msg{margin:12px 0;padding:12px;border-radius:10px}.bot{background:#1f2937}.user{background:#2563eb;margin-left:25%}textarea{width:100%;min-height:80px;background:#111827;color:#fff}button{padding:10px 16px}.input{position:fixed;bottom:0;left:220px;right:0;background:#0b0f19;padding:10px}@media(max-width:768px){.wrap{display:block}aside{width:auto}.input{left:0}}
